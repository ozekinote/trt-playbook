<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>TRT 営業 実践知 — MEDDPICC × 顧客の声</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF7;
    --paper-2:#F1F0EA;
    --ink:#18181B;
    --ink-2:#52524C;
    --hair:#DEDCD3;
    --red:#F72717;          /* Edenred — reserved for 警告/やらない */
    --maroon:#7A0E05;
    --proven:#1E5C3A;       /* 実証 */
    --hyp:#9A6B12;          /* 仮説・未検証 */
    --shadow:0 1px 0 rgba(0,0,0,.03), 0 8px 24px -16px rgba(24,24,27,.28);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans JP",system-ui,sans-serif;
    font-weight:400;line-height:1.7;letter-spacing:.01em;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}

  /* ---------- Header ---------- */
  header{border-bottom:1.5px solid var(--ink);background:var(--paper);position:relative}
  .eyebrow{font-family:"Archivo",sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--red)}
  .head-grid{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;
    padding:26px 0 22px;flex-wrap:wrap}
  h1{font-family:"Noto Sans JP",sans-serif;font-weight:700;font-size:clamp(22px,3.4vw,32px);
    margin:.35em 0 .15em;line-height:1.25;letter-spacing:0}
  .thesis{color:var(--ink-2);font-size:14.5px;max-width:46ch}
  .ribbon{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;
    letter-spacing:.06em;color:var(--ink-2);border:1px solid var(--hair);
    padding:5px 9px;border-radius:2px;white-space:nowrap;background:var(--paper-2)}

  /* ---------- Controls ---------- */
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:16px 0;border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:20;
    background:var(--paper)}
  .search{flex:1 1 280px;display:flex;align-items:center;gap:9px;border:1.5px solid var(--ink);
    border-radius:3px;padding:9px 13px;background:#fff}
  .search svg{flex:none}
  .search input{border:0;outline:0;font-family:inherit;font-size:14.5px;width:100%;background:transparent;color:var(--ink)}
  .search input::placeholder{color:#9b9b93}
  .statusfilter{display:flex;gap:6px}
  .chip{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.04em;
    border:1px solid var(--hair);background:#fff;color:var(--ink-2);padding:7px 11px;border-radius:2px;
    cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--red);outline-offset:2px}

  /* ---------- Layout ---------- */
  .main{display:grid;grid-template-columns:236px 1fr;gap:34px;padding:28px 0 80px}

  /* spine */
  .spine{position:sticky;top:74px;align-self:start;height:max-content}
  .spine h2{font-family:"Archivo",sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-2);margin:0 0 12px;padding-left:2px}
  .shelf{display:grid;grid-template-columns:30px 1fr auto;align-items:center;gap:10px;width:100%;
    border:0;background:transparent;text-align:left;cursor:pointer;padding:9px 8px;border-radius:4px;
    border-left:2px solid transparent;color:var(--ink);font-family:inherit;transition:background .14s}
  .shelf:hover{background:var(--paper-2)}
  .shelf[aria-pressed="true"]{background:var(--paper-2);border-left-color:var(--red)}
  .shelf:focus-visible{outline:2px solid var(--red);outline-offset:1px}
  .shelf .ltr{font-family:"Archivo",sans-serif;font-weight:800;font-size:20px;color:var(--ink);line-height:1}
  .shelf[aria-pressed="true"] .ltr{color:var(--red)}
  .shelf .nm{font-size:13px;font-weight:500;line-height:1.3}
  .shelf .nm small{display:block;font-family:"JetBrains Mono",monospace;font-size:9.5px;
    color:var(--ink-2);letter-spacing:.03em;font-weight:500}
  .shelf .ct{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;color:var(--ink-2)}
  .shelf.empty .ltr,.shelf.empty .nm{color:#b4b2a8}
  .shelf .ct.zero{color:#c4c2b8}

  /* cards */
  .count-line{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-2);
    letter-spacing:.04em;margin:0 0 16px}
  .cards{display:grid;gap:18px}
  .card{background:#fff;border:1px solid var(--hair);border-radius:5px;box-shadow:var(--shadow);
    overflow:hidden}
  .card-top{padding:16px 20px 14px;border-bottom:1px solid var(--paper-2)}
  .scene-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:11px}
  .tag-ltr{font-family:"Archivo",sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;
    color:#fff;background:var(--ink);width:22px;height:22px;display:inline-flex;align-items:center;
    justify-content:center;border-radius:3px;flex:none}
  .scene{font-weight:700;font-size:15.5px;line-height:1.35}
  .quote{display:flex;gap:11px;align-items:flex-start;border-left:2.5px solid var(--ink);
    padding:2px 0 2px 13px}
  .rec{font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:700;letter-spacing:.08em;
    color:var(--ink-2);border:1px solid var(--hair);border-radius:2px;padding:2px 5px;margin-top:3px;
    white-space:nowrap;display:inline-flex;gap:5px;align-items:center}
  .rec b{color:var(--red);font-size:7px;line-height:1}
  .quote p{margin:0;font-size:16px;font-weight:500;color:var(--ink);line-height:1.45}
  .quote p::before{content:"\201C";color:var(--ink-2)}
  .quote p::after{content:"\201D";color:var(--ink-2)}

  .card-body{padding:6px 20px 18px}
  .field{padding:13px 0;border-bottom:1px solid var(--paper-2)}
  .field:last-child{border-bottom:0}
  .flabel{font-family:"Archivo",sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-2);margin-bottom:5px;display:flex;align-items:center;gap:7px}
  .field p{margin:0;font-size:14px;line-height:1.65;color:var(--ink)}
  .field.dont{background:#FEF4F2;margin:0 -20px;padding:13px 20px;border-bottom:1px solid #f6ddd7}
  .field.dont .flabel{color:var(--red)}
  .field.dont p{color:var(--maroon);font-weight:500}
  .field.speaker p{color:var(--ink-2);font-size:13px}
  .field.speaker .who{color:var(--ink);font-weight:700;font-size:13.5px}

  /* meta footer */
  .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 20px;
    background:var(--paper);border-top:1px solid var(--paper-2)}
  .pill{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;letter-spacing:.03em;
    padding:4px 9px;border-radius:2px;border:1px solid var(--hair);color:var(--ink-2);background:#fff}
  .pill.proven{color:var(--proven);border-color:#bcd6c6;background:#f1f8f3}
  .pill.hyp{color:var(--hyp);border-color:#e6d3a6;background:#fbf6e9}
  .pill.freq::before{content:"頻度 ";color:var(--ink-2);font-weight:500}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .dot.proven{background:var(--proven)}.dot.hyp{background:var(--hyp)}

  .empty-note{border:1.5px dashed var(--hair);border-radius:5px;padding:26px 22px;text-align:center;
    color:var(--ink-2);font-size:13.5px;background:transparent}
  .empty-note b{color:var(--ink);font-weight:700}

  footer{border-top:1.5px solid var(--ink);padding:22px 0;font-family:"JetBrains Mono",monospace;
    font-size:11px;color:var(--ink-2);letter-spacing:.03em;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}

  @media (max-width:820px){
    .main{grid-template-columns:1fr;gap:18px}
    .spine{position:static;display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;
      -webkit-overflow-scrolling:touch}
    .spine h2{display:none}
    .shelf{grid-template-columns:auto auto;min-width:max-content;border-left:0;border-bottom:2px solid transparent;border-radius:3px}
    .shelf .nm small,.shelf .ct{display:none}
    .shelf[aria-pressed="true"]{border-left:0;border-bottom-color:var(--red)}
    .controls{top:0}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  .field.sources{padding-top:13px}
  .srclist{display:flex;flex-wrap:wrap;gap:7px}
  .src{font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.35;padding:5px 9px;border-radius:2px;border:1px solid var(--hair);text-decoration:none;display:inline-block}
  a.src.link{color:var(--ink);background:#fff}
  a.src.link:hover{border-color:var(--ink);background:var(--paper-2)}
  a.src.link:focus-visible{outline:2px solid var(--red);outline-offset:2px}
  .src.internal{color:var(--ink-2);background:var(--paper-2);border-style:dashed}
</style>
</head>
<body>

<header>
  <div class="wrap head-grid">
    <div>
      <span class="eyebrow">Edenred Ticket Restaurant ／ Sales Playbook</span>
      <h1>営業 実践知 — 顧客の一言から、読みと打ち手を引く</h1>
      <p class="thesis">MEDDPICC を棚に、録音文字起こしから拾った「顧客の生の声」を索引化。商談前・商談中に逆引きするための、現場の第三層（実践知）。</p>
    </div>
    <span class="ribbon">実データ版 ／ 約190商談分析</span>
  </div>
</header>

<div class="wrap">
  <div class="controls">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#18181B" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="#18181B" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input id="q" type="search" placeholder="顧客が言った言葉で引く（例：非課税、上に確認、レシート）" autocomplete="off">
    </label>
    <div class="statusfilter" role="group" aria-label="状態で絞り込み">
      <button class="chip" id="f-all" aria-pressed="true">すべて</button>
      <button class="chip" id="f-proven" aria-pressed="false">実証のみ</button>
      <button class="chip" id="f-hyp" aria-pressed="false">仮説のみ</button>
    </div>
    <div class="statusfilter" role="group" aria-label="並び替え">
      <button class="chip" id="sort-original" aria-pressed="true">収録順</button>
      <button class="chip" id="sort-freq" aria-pressed="false">FAQ頻度順</button>
    </div>
  </div>

  <div class="main">
    <nav class="spine" aria-label="MEDDPICC">
      <h2>MEDDPICC</h2>
      <div id="spine"></div>
    </nav>

    <section>
      <p class="count-line" id="countline"></p>
      <div class="cards" id="cards"></div>
    </section>
  </div>
</div>

<footer class="wrap" style="max-width:1180px">
  <span>第三層＝兆候 × 読み × 打ち手（特に「やらない」）。第一層・第二層は索引化しない。</span>
  <span>v0.8 ／ 実データ版（FAQ整合・根拠リンク・FAQ頻度順ソート）</span>
</footer>

<script>
const SHELVES = [
  {k:"M",  key:"M",  nm:"指標",        en:"Metrics"},
  {k:"E",  key:"E",  nm:"決裁者",      en:"Economic Buyer"},
  {k:"D",  key:"DC", nm:"決定基準",    en:"Decision Criteria"},
  {k:"D",  key:"DP", nm:"決定プロセス",en:"Decision Process"},
  {k:"P",  key:"PP", nm:"契約プロセス",en:"Paper Process"},
  {k:"I",  key:"I",  nm:"課題 / CE",   en:"Identify Pain"},
  {k:"C",  key:"CH", nm:"チャンピオン",en:"Champion"},
  {k:"C",  key:"CO", nm:"競合",        en:"Competition"},
];

let CARDS = [];

const EMPTY_MSG = "<b>未着手（0件）</b><br>この棚は、文字起こし分析から流し込み予定です。構造はもう用意できています。";

let active = "ALL";        // shelf key or ALL
let statusF = "all";       // all | proven | hyp
let sortMode = "original"; // original（cards.json 収録順）| freq
let query = "";

/** 商談文字起こし上の言及頻度（freq 文字列 → スコア） */
function freqScore(freq) {
  if (!freq) return 0;
  if (/最頻|最多言及|FAQ最頻/.test(freq)) return 9999;
  const n = freq.match(/~(\d+)/);
  if (n) return Number(n[1]);
  if (/^高/.test(freq) || freq === "高") return 100;
  if (/^中/.test(freq) || freq === "中") return 50;
  if (/^低/.test(freq) || freq === "低") return 10;
  return 30;
}

function sortCards(list) {
  if (sortMode === "freq") {
    return [...list].sort((a, b) => {
      const d = freqScore(b.freq) - freqScore(a.freq);
      return d !== 0 ? d : (a._idx ?? 0) - (b._idx ?? 0);
    });
  }
  // 収録順＝Claude 正本の並び（v0.8 反映時の意図順）。棚は左ナビで絞る。
  return [...list].sort((a, b) => (a._idx ?? 0) - (b._idx ?? 0));
}

const $ = s => document.querySelector(s);
const spineEl = $("#spine"), cardsEl = $("#cards"), countEl = $("#countline");

function countFor(key){
  return CARDS.filter(c => key==="ALL" || c.shelf===key).length;
}

function renderSpine(){
  spineEl.innerHTML = "";
  // ALL pseudo-shelf
  const total = CARDS.length;
  SHELVES.forEach(s=>{
    const n = CARDS.filter(c=>c.shelf===s.key).length;
    const b = document.createElement("button");
    b.className = "shelf" + (n===0 ? " empty":"");
    b.setAttribute("aria-pressed", active===s.key);
    b.innerHTML = `<span class="ltr">${s.k}</span>
      <span class="nm">${s.nm}<small>${s.en}</small></span>
      <span class="ct ${n===0?"zero":""}">${n}</span>`;
    b.onclick = ()=>{ active = (active===s.key? "ALL" : s.key); render(); };
    spineEl.appendChild(b);
  });
}

function statusPill(st){
  return st==="proven"
    ? `<span class="pill proven"><span class="dot proven"></span>実証</span>`
    : `<span class="pill hyp"><span class="dot hyp"></span>仮説・未検証</span>`;
}

function cardHTML(c, rank){
  const letter = c.shelf==="DC"||c.shelf==="DP" ? "D" :
                 c.shelf==="CH"||c.shelf==="CO" ? "C" :
                 c.shelf;
  const rankBadge = rank != null
    ? `<span class="pill freq" title="FAQ頻度順">#${rank}</span>`
    : "";
  const srcBlock = (c.sources && c.sources.length) ? `<div class="field sources">
        <div class="flabel">根拠 / SOURCES</div>
        <div class="srclist">${c.sources.map(s => s.url
          ? `<a class="src link" href="${s.url}" target="_blank" rel="noopener">${s.label} ↗</a>`
          : `<span class="src internal">${s.label}</span>`).join("")}</div>
      </div>` : "";
  return `<article class="card">
    <div class="card-top">
      <div class="scene-row">
        <span class="tag-ltr">${letter}</span>
        <span class="scene">${c.scene}</span>
      </div>
      <div class="quote">
        <span class="rec"><b>●</b>録音</span>
        <p>${c.quote}</p>
      </div>
    </div>
    <div class="card-body">
      ${c.speakerRead?`<div class="field speaker">
        <div class="flabel">発話者で読みが変わる</div>
        <p><span class="who">${c.speaker}</span> — ${c.speakerRead}</p>
      </div>`:""}
      <div class="field">
        <div class="flabel">読み（兆候の本当の意味）</div>
        <p>${c.read}</p>
      </div>
      <div class="field">
        <div class="flabel">打ち手</div>
        <p>${c.doIt}</p>
      </div>
      <div class="field dont">
        <div class="flabel">やらない</div>
        <p>${c.dont}</p>
      </div>
      ${srcBlock}
    </div>
    <div class="meta">
      ${statusPill(c.status)}
      ${rankBadge}
      <span class="pill freq">${c.freq}</span>
    </div>
  </article>`;
}

function render(){
  renderSpine();
  let list = CARDS.filter(c=>{
    if(active!=="ALL" && c.shelf!==active) return false;
    if(statusF!=="all" && c.status!==statusF) return false;
    if(query){
      const hay = (c.scene+c.quote+c.read+c.doIt+c.dont+c.speaker).toLowerCase();
      if(!hay.includes(query)) return false;
    }
    return true;
  });

  list = sortCards(list);

  const shelfNm = active==="ALL" ? "全棚" :
    (()=>{const s=SHELVES.find(x=>x.key===active);return `${s.k}・${s.nm}`;})();
  const sortNm = sortMode === "freq" ? "FAQ頻度順" : "収録順";
  countEl.textContent = `${shelfNm} — ${list.length} 件 · ${sortNm}` + (query?` · 「${query}」`:"");

  if(list.length===0){
    // empty shelf vs no match
    const shelfHasNone = active!=="ALL" && CARDS.filter(c=>c.shelf===active).length===0 && !query && statusF==="all";
    cardsEl.innerHTML = `<div class="empty-note">${shelfHasNone?EMPTY_MSG:"該当なし。検索語や絞り込みを変えてください。"}</div>`;
    return;
  }
  cardsEl.innerHTML = list.map((c, i) => cardHTML(c, sortMode === "freq" ? i + 1 : null)).join("");
}

function setSort(mode) {
  sortMode = mode;
  $("#sort-original").setAttribute("aria-pressed", mode === "original");
  $("#sort-freq").setAttribute("aria-pressed", mode === "freq");
  render();
}

// status chips
function setStatus(v){
  statusF = v;
  ["all","proven","hyp"].forEach(x=>$("#f-"+x).setAttribute("aria-pressed", x===v));
  render();
}
$("#f-all").onclick   = ()=>setStatus("all");
$("#f-proven").onclick= ()=>setStatus("proven");
$("#f-hyp").onclick   = ()=>setStatus("hyp");
$("#sort-original").onclick = ()=>setSort("original");
$("#sort-freq").onclick  = ()=>setSort("freq");

$("#q").addEventListener("input", e=>{ query = e.target.value.trim().toLowerCase(); render(); });

async function init(){
  try {
    const res = await fetch('./cards.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const raw = data.cards ?? data;
    const excluded = new Set(data.meta?.excluded ?? []);
    CARDS = raw
      .map((c, i) => ({ ...c, _idx: i }))
      .filter((c) => !c.hidden && !excluded.has(c.scene));
    render();
  } catch (err) {
    cardsEl.innerHTML = '<div class="empty-note"><b>cards.json の読み込みに失敗しました</b><br>' + err.message + '</div>';
  }
}

init();
</script>
</body>
</html>

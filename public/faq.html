<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>FAQ — TRT Sales Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    padding:16px 0;border-bottom:1px solid var(--hair);position:sticky;top:0;z-index:20;
    background:var(--paper)}
  .search{flex:1 1 280px;display:flex;align-items:center;gap:9px;border:1.5px solid var(--ink);
    border-radius:3px;padding:9px 13px;background:#fff}
  .search svg{flex:none}
  .search input{border:0;outline:0;font-family:inherit;font-size:14.5px;width:100%;background:transparent;color:var(--ink)}
  .search input::placeholder{color:#9b9b93}

  .main{display:grid;grid-template-columns:200px 1fr;gap:34px;padding:28px 0 80px}
  .spine{position:sticky;top:74px;align-self:start;height:max-content}
  .spine h2{font-family:"Archivo",sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-2);margin:0 0 12px;padding-left:2px}
  .cat-btn{display:block;width:100%;border:0;background:transparent;text-align:left;cursor:pointer;
    padding:9px 10px;border-radius:4px;border-left:2px solid transparent;color:var(--ink);
    font-family:inherit;font-size:13px;font-weight:500;transition:background .14s}
  .cat-btn:hover{background:var(--paper-2)}
  .cat-btn[aria-pressed="true"]{background:var(--paper-2);border-left-color:var(--red);font-weight:700}
  .cat-btn .ct{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-2);margin-left:6px}

  .count-line{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-2);
    letter-spacing:.04em;margin:0 0 16px}
  .faq-list{display:grid;gap:20px}
  .faq-card{background:#fff;border:1px solid var(--hair);border-radius:5px;box-shadow:var(--shadow);
    padding:20px 22px 18px;scroll-margin-top:88px}
  .faq-id{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;color:var(--red);
    letter-spacing:.06em;margin-bottom:4px}
  .faq-cat{font-size:11px;color:var(--ink-2);margin-bottom:8px}
  .faq-q{font-size:16px;font-weight:700;margin:0 0 12px;line-height:1.45}
  .faq-conclusion{background:var(--paper-2);border-left:3px solid var(--ink);padding:10px 14px;margin:0 0 12px;
    font-size:14px;line-height:1.6}
  .faq-conclusion strong{font-family:"Archivo",sans-serif;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;display:block;margin-bottom:4px;color:var(--ink-2)}
  .faq-section{margin:0 0 12px}
  .faq-section h4{font-family:"Archivo",sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-2);margin:0 0 4px}
  .faq-section p{margin:0;font-size:13.5px;line-height:1.65;color:var(--ink);white-space:pre-line}
  .faq-misconception{font-size:12.5px;color:var(--maroon);background:#FEF4F2;border:1px solid #f6ddd7;
    padding:8px 11px;border-radius:3px;margin:0 0 8px;line-height:1.55}
  .faq-footnote{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-2);
    line-height:1.5;margin:0 0 12px}
  .xref{margin-top:14px;padding-top:12px;border-top:1px dashed var(--hair)}
  .xref-label{font-family:"Archivo",sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-2);margin-bottom:8px}
  .xref-links{display:flex;flex-wrap:wrap;gap:6px}
  .xref-links a{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;
    padding:4px 9px;border-radius:2px;border:1px solid var(--hair);color:var(--ink);
    text-decoration:none;background:#fff}
  .xref-links a:hover{border-color:var(--ink);background:var(--paper-2)}
  .empty-note{border:1.5px dashed var(--hair);border-radius:5px;padding:26px 22px;text-align:center;
    color:var(--ink-2);font-size:13.5px}

  @media (max-width:820px){
    .main{grid-template-columns:1fr;gap:18px}
    .spine{position:static;display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
    .spine h2{display:none}
    .cat-btn{min-width:max-content;white-space:nowrap}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="head-grid">
      <div>
        <span class="eyebrow">Edenred Ticket Restaurant ／ Sales Playbook</span>
        <h1>FAQ</h1>
        <p class="thesis">提案デッキ準拠の Q&amp;A。数値・根拠・手続きの正本。商談カード（MEDDPICC）とは別管理。</p>
      </div>
    </div>
    <nav class="site-nav" aria-label="サイト内">
      <a href="./">MEDDPICC</a>
      <a href="./faq.html" aria-current="page">FAQ</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="controls">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#18181B" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="#18181B" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input id="q" type="search" placeholder="キーワードで引く（例：非課税、天引き、手数料）" autocomplete="off">
    </label>
  </div>

  <div class="main">
    <nav class="spine" aria-label="カテゴリ">
      <h2>Category</h2>
      <div id="spine"></div>
    </nav>
    <section>
      <p class="count-line" id="countline"></p>
      <div class="faq-list" id="faqs"></div>
    </section>
  </div>
</div>

<footer class="wrap">
  <span>FAQ正本＝提案デッキ P38–56。更新は PPTX → faq.json。</span>
  <span id="meta-ver">—</span>
</footer>

<script>
let FAQ_ITEMS = [];
let CARDS = [];
let activeCat = 'ALL';
let query = '';

const $ = s => document.querySelector(s);
const spineEl = $('#spine');
const faqsEl = $('#faqs');
const countEl = $('#countline');

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function categories(){
  const m = new Map();
  for (const f of FAQ_ITEMS) m.set(f.category, (m.get(f.category)||0)+1);
  return [...m.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ja'));
}

function cardsForFaq(id){
  return CARDS.filter(c => (c.faqIds||[]).includes(id));
}

function faqHTML(f){
  const xrefs = cardsForFaq(f.id);
  const sections = (f.sections||[]).map(s=>`
    <div class="faq-section">
      <h4>${esc(s.title)}</h4>
      <p>${esc(s.body)}</p>
    </div>`).join('');
  const xref = xrefs.length ? `<div class="xref">
    <div class="xref-label">関連する商談カード（MEDDPICC）</div>
    <div class="xref-links">${xrefs.map(c=>
      `<a href="./#${encodeURIComponent(c.scene)}" title="${esc(c.scene)}">${esc(c.scene.slice(0,28))}${c.scene.length>28?'…':''}</a>`
    ).join('')}</div>
  </div>` : '';
  return `<article class="faq-card" id="${esc(f.id)}">
    <div class="faq-id">${esc(f.id)}</div>
    <div class="faq-cat">${esc(f.category)}</div>
    <p class="faq-q">Q：${esc(f.question)}</p>
    <div class="faq-conclusion"><strong>結論</strong>${esc(f.conclusion)}</div>
    ${sections}
    ${f.misconception?`<p class="faq-misconception">よくある誤解：${esc(f.misconception)}</p>`:''}
    ${f.footnote?`<p class="faq-footnote">${esc(f.footnote)}</p>`:''}
    ${xref}
  </article>`;
}

function renderSpine(){
  const cats = categories();
  spineEl.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn';
  allBtn.setAttribute('aria-pressed', activeCat === 'ALL');
  allBtn.textContent = 'すべて';
  allBtn.innerHTML = `すべて<span class="ct">${FAQ_ITEMS.length}</span>`;
  allBtn.onclick = ()=>{ activeCat = 'ALL'; render(); };
  spineEl.appendChild(allBtn);
  for (const [cat, n] of cats){
    const b = document.createElement('button');
    b.className = 'cat-btn';
    b.setAttribute('aria-pressed', activeCat === cat);
    b.innerHTML = `${esc(cat)}<span class="ct">${n}</span>`;
    b.onclick = ()=>{ activeCat = activeCat === cat ? 'ALL' : cat; render(); };
    spineEl.appendChild(b);
  }
}

function render(){
  renderSpine();
  let list = FAQ_ITEMS.filter(f=>{
    if (activeCat !== 'ALL' && f.category !== activeCat) return false;
    if (query){
      const hay = [f.id,f.category,f.question,f.conclusion,f.misconception,f.footnote,
        ...(f.sections||[]).flatMap(s=>[s.title,s.body])].join(' ').toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  });
  const catNm = activeCat === 'ALL' ? '全カテゴリ' : activeCat;
  countEl.textContent = `${catNm} — ${list.length} 件` + (query ? ` · 「${query}」` : '');
  if (!list.length){
    faqsEl.innerHTML = '<div class="empty-note">該当なし。検索語やカテゴリを変えてください。</div>';
    return;
  }
  faqsEl.innerHTML = list.map(faqHTML).join('');
}

$('#q').addEventListener('input', e=>{
  query = e.target.value.trim().toLowerCase();
  render();
});

async function init(){
  try {
    const [faqRes, cardsRes] = await Promise.all([
      fetch('./faq.json', { cache: 'no-cache' }),
      fetch('./cards.json', { cache: 'no-cache' }),
    ]);
    if (!faqRes.ok) throw new Error('faq.json HTTP ' + faqRes.status);
    const faqData = await faqRes.json();
    FAQ_ITEMS = faqData.items ?? faqData;
    if (cardsRes.ok){
      const cardData = await cardsRes.json();
      CARDS = cardData.cards ?? cardData;
    }
    const m = faqData.meta;
    if (m) $('#meta-ver').textContent = `FAQ v${m.version} ／ ${m.updated}`;
    render();
    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash){
      requestAnimationFrame(()=>{
        document.getElementById(hash)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }
  } catch (err) {
    faqsEl.innerHTML = '<div class="empty-note"><b>faq.json の読み込みに失敗しました</b><br>' + esc(err.message) + '</div>';
  }
}

init();
</script>
</body>
</html>
